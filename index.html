<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penge Churches — Benefits Intelligence Report | TwentySix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=Fraunces:opsz,wght@9..144,400..800;1,9..144,400..800&family=Space+Grotesk:wght@400..700&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:       #0c1829;
      --navy-mid:   #152238;
      --navy-light: #1e2f4a;
      --gold:       #c9a84c;
      --gold-light: #e2c97e;
      --cream:      #f7f5f0;
      --white:      #ffffff;
      --text:       #0c1829;
      --text-mid:   #374151;
      --text-soft:  #6b7280;
      --green:      #15803d;
      --green-bg:   #dcfce7;
      --above-green:  #0e6b2e;
      --above-bg:   #bbf7d0;
      --amber:      #b45309;
      --amber-bg:   #fef3c7;
      --unique:     #4338ca;
      --unique-bg:  #e0e7ff;
      --col-s-head: #1a3158;
      --col-l-head: #163828;
      --col-t-head: #3d1828;
      --shadow-sm:  0 1px 3px rgba(12,24,41,0.07);
      --shadow-md:  0 4px 20px rgba(12,24,41,0.09), 0 1px 4px rgba(12,24,41,0.05);
      --shadow-lg:  0 12px 48px rgba(12,24,41,0.13), 0 4px 12px rgba(12,24,41,0.07);
      --radius:     8px;
      --radius-lg:  14px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.65;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .site-header {
      background: var(--navy);
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }
    .header-inner {
      max-width: 1380px; margin: 0 auto;
      padding: 14px 40px;
      display: flex; align-items: center; gap: 20px;
    }
    .header-wordmark { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
    .header-wordmark .wm-name { color: var(--white); font-size: 17px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
    .header-wordmark .wm-name span { color: var(--white); }
    .hd { width: 1px; height: 26px; background: rgba(255,255,255,0.12); flex-shrink: 0; }
    .header-title { flex: 1; }
    .header-title h1 { color: #fff; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .header-title span { color: rgba(255,255,255,0.4); font-size: 11px; }
    .client-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold-light); font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 4px 13px; border-radius: 100px;
    }
    .date-note { color: rgba(255,255,255,0.3); font-size: 10px; display: block; text-align: right; margin-top: 3px; }

    /* ── SECTION NAV ── */
    .section-nav {
      background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.07);
      position: sticky; top: 60px; z-index: 190;
      box-shadow: var(--shadow-sm);
    }
    .nav-inner {
      max-width: 1380px; margin: 0 auto; padding: 0 40px;
      display: flex; overflow-x: auto;
    }
    .nav-inner::-webkit-scrollbar { display: none; }
    .nav-inner a {
      display: flex; align-items: center; gap: 7px;
      padding: 12px 16px; text-decoration: none;
      color: var(--text-soft); font-size: 12px; font-weight: 600;
      letter-spacing: 0.04em; white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-inner a:hover { color: var(--navy); border-bottom-color: var(--gold); }
    .nav-inner a svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 55%, #1c3050 100%);
      padding: 80px 40px 72px; text-align: center;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 25% 60%, rgba(201,168,76,0.09) 0%, transparent 100%),
                  radial-gradient(ellipse 50% 50% at 75% 40%, rgba(201,168,76,0.06) 0%, transparent 100%);
      pointer-events: none;
    }
    .hero::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 1px; background: linear-gradient(to right, transparent, rgba(201,168,76,0.45), transparent);
    }
    .hero-content { position: relative; max-width: 800px; margin: 0 auto; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25);
      color: var(--gold-light); font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 6px 18px; border-radius: 100px; margin-bottom: 26px;
    }
    .hero h2 { color: var(--white); font-size: 46px; font-weight: 800; line-height: 1.1; margin-bottom: 18px; letter-spacing: -0.025em; }
    .hero h2 em { font-style: normal; color: var(--gold); }
    .hero-sub { color: rgba(255,255,255,0.55); font-size: 15.5px; max-width: 600px; margin: 0 auto 44px; line-height: 1.75; }
    .hero-stats {
      display: flex; justify-content: center;
      border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-lg);
      overflow: hidden; background: rgba(255,255,255,0.03);
      max-width: 600px; margin: 0 auto;
    }
    .hs { flex: 1; padding: 18px 20px; border-right: 1px solid rgba(255,255,255,0.08); }
    .hs:last-child { border-right: none; }
    .hs-val { color: var(--gold-light); font-size: 20px; font-weight: 800; display: block; letter-spacing: -0.02em; }
    .hs-lbl { color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; display: block; }

    /* ── SECTION CARDS ── */
    .sec-cards-wrap { background: var(--navy-mid); padding: 44px 40px; border-bottom: 1px solid rgba(201,168,76,0.15); }
    .sec-cards-inner { max-width: 1380px; margin: 0 auto; }
    .sec-cards-label { text-align: center; color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 24px; }
    .sec-cards-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
    .sec-card {
      display: flex; flex-direction: column;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg); padding: 22px 18px 18px;
      text-decoration: none; position: relative; overflow: hidden;
      transition: background 0.2s, border-color 0.2s, transform 0.2s; cursor: pointer;
    }
    .sec-card:hover { transform: translateY(-3px); }
    .sec-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gold); opacity: 0; transition: opacity 0.2s; }
    .sec-card:hover::before { opacity: 1; }
    .sc-num { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; color: rgba(201,168,76,0.5); margin-bottom: 12px; display: block; }
    .sc-icon { width: 36px; height: 36px; border-radius: 9px; background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; flex-shrink: 0; color: var(--gold-light); }
    .sc-icon svg { width: 18px; height: 18px; }
    .sc-title { color: var(--white); font-size: 12px; font-weight: 700; line-height: 1.3; flex: 1; margin-bottom: 14px; }
    .sc-arrow { display: flex; align-items: center; gap: 5px; color: rgba(201,168,76,0.6); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
    .sc-arrow svg { width: 14px; height: 14px; }
    .sc-c1 { --cc: 110, 168, 254; }
    .sc-c2 { --cc: 45,  212, 191; }
    .sc-c3 { --cc: 251, 113, 133; }
    .sc-c4 { --cc: 251, 191,  36; }
    .sc-c5 { --cc:  52, 211, 153; }
    .sc-c6 { --cc: 167, 139, 250; }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6) { background: rgba(var(--cc), 0.08); border-color: rgba(var(--cc), 0.22); }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6)::before { background: rgb(var(--cc)); opacity: 0.55; }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6) .sc-icon { background: rgba(var(--cc), 0.16); color: rgb(var(--cc)); }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6) .sc-num { color: rgba(var(--cc), 0.6); }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6) .sc-arrow { color: rgba(var(--cc), 0.55); }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6):hover { background: rgba(var(--cc), 0.14); border-color: rgba(var(--cc), 0.4); }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6):hover::before { opacity: 1; }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6):hover .sc-arrow { color: rgb(var(--cc)); }

    /* ── PAGE BODY ── */
    .page-body { max-width: 1380px; margin: 0 auto; padding: 0 40px 80px; }

    /* ── INTRO ── */
    .intro-section { padding: 48px 0 0; }
    .intro-card { background: var(--white); border-radius: var(--radius-lg); padding: 34px 38px; box-shadow: var(--shadow-md); border-left: 4px solid var(--gold); }
    .intro-card p { color: var(--text-mid); font-size: 14.5px; line-height: 1.85; margin-bottom: 14px; }
    .intro-card p:last-child { margin-bottom: 0; }
    .intro-card strong { color: var(--text); font-weight: 600; }

    /* ── RULE ── */
    .rule { height: 1px; background: linear-gradient(to right, transparent, rgba(201,168,76,0.2), transparent); margin-top: 48px; }

    /* ── BENCH SECTION ── */
    .bench-section { padding: 48px 0 0; }
    .sec-hd { margin-bottom: 22px; }
    .sec-label-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .sec-num-badge { display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; background: var(--navy); color: var(--gold); font-size: 11px; font-weight: 800; flex-shrink: 0; }
    .sec-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); }
    .sec-title { font-size: 21px; font-weight: 800; color: var(--navy); letter-spacing: -0.02em; }
    .sec-desc { font-size: 13px; color: var(--text-soft); margin-top: 5px; }

    /* ── PROVISION CARDS ── */
    .prov-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 22px; }
    .prov-card {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 24px 22px; box-shadow: var(--shadow-md);
      border-top: 3px solid var(--gold); position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .prov-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .prov-card::after { content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px; background: radial-gradient(circle at top right, rgba(201,168,76,0.07), transparent 70%); }
    .pc-icon { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--navy), var(--navy-light)); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; color: var(--gold-light); }
    .pc-icon svg { width: 18px; height: 18px; }
    .prov-card h3 { font-size: 13.5px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .prov-card p { font-size: 12.5px; color: var(--text-soft); line-height: 1.55; margin-bottom: 14px; }
    .p-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; }
    .badge-green  { background: var(--green-bg);  color: var(--green);       border: 1px solid rgba(21,128,61,0.2);  }
    .badge-above  { background: var(--above-bg);  color: var(--above-green); border: 1px solid rgba(14,107,46,0.25); }
    .badge-amber  { background: var(--amber-bg);  color: var(--amber);       border: 1px solid rgba(180,83,9,0.2);   }
    .badge-unique { background: var(--unique-bg); color: var(--unique);      border: 1px solid rgba(67,56,202,0.2);  }

    /* ── TABLE ── */
    .tbl-wrap { background: var(--white); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); margin-top: 22px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.04); }
    .tbl-legend { display: flex; align-items: center; gap: 22px; padding: 11px 22px; background: #f9f8f6; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .tbl-legend span { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--text-soft); letter-spacing: 0.03em; }
    .tbl-legend .primary-label { color: var(--navy); font-weight: 700; }
    .ld { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ld-ha { background: #1a1a2e; }
    .ld-sp  { background: #4a7fcb; }
    .ld-lp   { background: #c9a84c; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    table colgroup col:first-child  { width: 17%; }
    table colgroup col:nth-child(2),
    table colgroup col:nth-child(3),
    table colgroup col:nth-child(4) { width: 27.67%; }

    thead th { padding: 16px 20px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; vertical-align: bottom; line-height: 1.3; }
    thead th:first-child  { background: var(--navy); color: var(--gold-light); }
    thead th:nth-child(2) { background: var(--col-t-head); color: #f0b0c0; }
    thead th:nth-child(2)::after { content: ' ★'; font-size: 9px; opacity: 0.7; }
    thead th:nth-child(3) { background: var(--col-l-head); color: #90d8a8; }
    thead th:nth-child(4) { background: var(--col-s-head); color: #a8c6e8; }
    .col-sub { display: block; font-size: 9.5px; font-weight: 400; opacity: 0.55; margin-top: 3px; letter-spacing: 0.05em; }

    tbody tr:nth-child(odd)  { background: var(--white); }
    tbody tr:nth-child(even) { background: #fafaf8; }
    tbody tr { transition: background 0.1s; border-bottom: 1px solid rgba(0,0,0,0.045); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(201,168,76,0.035) !important; }
    tbody td { padding: 15px 20px; vertical-align: top; color: var(--text-mid); line-height: 1.65; }
    tbody td:first-child { font-weight: 600; color: var(--navy); font-size: 12.5px; border-right: 1px solid rgba(0,0,0,0.06); }
    .cell-sub { display: block; font-size: 11px; font-weight: 400; color: var(--text-soft); margin-top: 3px; }
    tbody td:nth-child(2) { border-left: 2px solid rgba(176,48,96,0.12); }
    tbody td:nth-child(3) { border-left: 2px solid rgba(46,138,90,0.12); }
    tbody td:nth-child(4) { border-left: 2px solid rgba(74,127,203,0.12); }

    .yes-cell { display: inline-flex; align-items: center; gap: 6px; color: var(--green); font-weight: 600; font-size: 12.5px; }
    .yes-cell svg { width: 15px; height: 15px; flex-shrink: 0; }
    .no-cell { display: inline-flex; align-items: center; gap: 6px; color: var(--text-soft); font-size: 12.5px; font-style: italic; }
    .no-cell svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.5; }
    .mixed-cell { color: var(--amber); font-weight: 500; font-size: 12.5px; }
    .na-cell { color: var(--text-soft); font-size: 12.5px; font-style: italic; }

    /* ── CALLOUT ── */
    .callout { background: linear-gradient(150deg, var(--navy) 0%, var(--navy-mid) 100%); border-radius: var(--radius-lg); padding: 24px 28px; position: relative; overflow: hidden; }
    .callout::before { content: ''; position: absolute; top: -20px; right: -20px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(201,168,76,0.12), transparent 70%); }
    .callout-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 13px; }
    .callout-hd svg { width: 18px; height: 18px; color: var(--gold); flex-shrink: 0; }
    .callout-hd h4 { color: var(--gold-light); font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .callout ul { list-style: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 9px; }
    .callout li { display: flex; align-items: flex-start; gap: 9px; color: rgba(255,255,255,0.68); font-size: 13px; line-height: 1.55; }
    .callout li::before { content: ''; display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--gold); margin-top: 7px; flex-shrink: 0; }

    /* ── FOOTER ── */
    footer { background: var(--navy); padding: 44px 40px; text-align: center; margin-top: 60px; }
    .footer-wordmark { display: inline-block; margin-bottom: 20px; }
    .footer-wordmark .fw-name { color: rgba(255,255,255,0.5); font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
    .footer-wordmark .fw-name em { font-style: normal; color: rgba(201,168,76,0.65); }
    .footer-conf { display: inline-flex; align-items: center; gap: 6px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2); color: rgba(201,168,76,0.6); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 13px; border-radius: 100px; margin-top: 4px; margin-bottom: 20px; }
    .footer-txt { color: rgba(255,255,255,0.32); font-size: 12px; line-height: 1.85; }
    .footer-txt strong { color: rgba(255,255,255,0.55); font-weight: 500; }
    .footer-txt a { color: var(--gold); text-decoration: none; }
    .footer-rule { height: 1px; background: rgba(255,255,255,0.07); max-width: 360px; margin: 14px auto; }

    /* ── PRIMARY COMPARATOR NOTE ── */
    .primary-note {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(176,48,96,0.1); border: 1px solid rgba(176,48,96,0.2);
      color: #c06080; font-size: 10px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 100px; margin-left: 8px; vertical-align: middle;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) { .sec-cards-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px)  { .sec-cards-grid { grid-template-columns: repeat(2, 1fr); } .prov-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 640px)  {
      .hero h2 { font-size: 28px; } .page-body { padding: 0 20px 60px; }
      .header-inner { padding: 12px 20px; } .sec-cards-wrap { padding: 32px 20px; }
      .sec-cards-grid { grid-template-columns: 1fr 1fr; } .prov-grid { grid-template-columns: 1fr; }
      thead th { font-size: 10px; padding: 11px 13px; } tbody td { padding: 12px 13px; font-size: 12px; }
    }
  
    /* ── V2 OVERRIDES & SPA SHELL ───────────────────────────── */
    :root {
      --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'Space Grotesk', 'Plus Jakarta Sans', sans-serif;
      --sidebar-w: 260px;
    }
    html, body { height: 100%; }
    body { font-family: var(--font-body); }
    h1, h2, h3, h4, .hero h2, .sec-title { font-family: var(--font-display); letter-spacing: -0.018em; }

    /* Hide v1 chrome (header/section-nav/footer/rule dividers) */
    .site-header, .section-nav, .rule, .page-body > footer { display: none !important; }

    /* App shell */
    .app-shell { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--navy);
      color: var(--cream);
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
      border-right: 1px solid rgba(201,168,76,0.18);
      z-index: 50;
    }
    .sidebar-head {
      padding: 26px 22px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-brand {
      color: var(--gold); font-size: 10px; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px;
    }
    .sidebar-client {
      color: var(--white); font-family: var(--font-display);
      font-size: 19px; font-weight: 700; letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .sidebar-client-sub {
      color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 4px;
    }

    .sidebar-nav {
      padding: 14px 12px; flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 2px;
    }
    .sidebar-nav::-webkit-scrollbar { width: 6px; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    .navlink {
      all: unset;
      display: flex; align-items: center; gap: 12px;
      padding: 10px 14px; border-radius: 8px; cursor: pointer;
      color: rgba(255,255,255,0.62); font-size: 13.5px; font-weight: 500;
      transition: background 0.15s, color 0.15s, transform 0.15s;
      position: relative;
    }
    .navlink:hover { background: rgba(255,255,255,0.04); color: var(--white); }
    .navlink.active {
      background: linear-gradient(90deg, rgba(201,168,76,0.18), rgba(201,168,76,0.04));
      color: var(--white); font-weight: 600;
    }
    .navlink.active::before {
      content: ''; position: absolute; left: -12px; top: 8px; bottom: 8px;
      width: 3px; border-radius: 0 3px 3px 0; background: var(--gold);
    }
    .navlink-icon {
      width: 18px; height: 18px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.5); transition: color 0.15s;
    }
    .navlink-icon svg { width: 18px; height: 18px; }
    .navlink:hover .navlink-icon, .navlink.active .navlink-icon { color: var(--gold-light); }

    .sidebar-foot {
      padding: 16px 22px; border-top: 1px solid rgba(255,255,255,0.06);
      font-size: 10.5px; color: rgba(255,255,255,0.32);
      line-height: 1.55;
    }
    .sidebar-foot .conf-tag {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2);
      color: rgba(201,168,76,0.7); font-size: 9.5px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 3px 10px; border-radius: 100px; margin-top: 8px;
    }

    /* Main scrollable area */
    .main {
      flex: 1; min-width: 0; overflow-x: hidden;
    }
    .main-topbar {
      position: sticky; top: 0; z-index: 30;
      background: rgba(247,245,240,0.85); backdrop-filter: saturate(180%) blur(12px);
      -webkit-backdrop-filter: saturate(180%) blur(12px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      padding: 14px 40px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .crumb { font-size: 12px; color: var(--text-soft); }
    .crumb span { color: var(--navy); font-weight: 600; }
    .topbar-actions { display: flex; align-items: center; gap: 8px; }
    .pill {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--white); border: 1px solid rgba(0,0,0,0.07);
      color: var(--text-mid); font-size: 11px; font-weight: 600;
      padding: 5px 12px; border-radius: 100px;
    }
    .pill svg { width: 11px; height: 11px; }

    .page-wrap { padding: 0 40px 60px; max-width: 1200px; margin: 0 auto; }

    /* Page = each routed section */
    .page { display: none; animation: fadeIn 0.35s ease; }
    .page.active { display: block; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Override existing section padding when in SPA mode */
    .page .bench-section { padding: 32px 0 0; }
    .page .intro-section { padding: 32px 0 0; }

    /* Overview-specific tweaks */
    .overview-hero { margin: 24px 0 22px; border-radius: var(--radius-lg); overflow: hidden; }
    .overview-hero .hero { padding: 56px 36px 50px; border-radius: var(--radius-lg); }
    .overview-hero .hero h2 { font-size: 38px; }

    /* Section cards inside Overview */
    .overview-cards { margin: 0 -40px; }
    .overview-cards .sec-cards-wrap { padding: 36px 40px; border-radius: 0; background: var(--navy-mid); }
    .overview-cards .sec-cards-grid { grid-template-columns: repeat(3, 1fr); }
    @media (max-width: 900px) { .overview-cards .sec-cards-grid { grid-template-columns: repeat(2, 1fr); } }

    /* Make section nav cards swap pages via JS rather than anchor */
    .sec-card { cursor: pointer; }

    /* Commentary placeholder */
    .commentary-empty {
      background: var(--white); border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md); padding: 80px 40px; text-align: center;
      border: 1px dashed rgba(0,0,0,0.1); margin-top: 22px;
    }
    .commentary-empty .ce-icon {
      width: 64px; height: 64px; border-radius: 16px;
      background: linear-gradient(135deg, rgba(201,168,76,0.12), rgba(201,168,76,0.04));
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--gold); margin-bottom: 18px;
    }
    .commentary-empty .ce-icon svg { width: 28px; height: 28px; }
    .commentary-empty h3 { font-family: var(--font-display); font-size: 22px; color: var(--navy); margin-bottom: 8px; }
    .commentary-empty p { color: var(--text-soft); font-size: 14px; max-width: 480px; margin: 0 auto; line-height: 1.7; }

    /* Mobile */
    .mobile-toggle { display: none; }
    @media (max-width: 900px) {
      .sidebar {
        position: fixed; left: 0; top: 0; bottom: 0;
        transform: translateX(-100%); transition: transform 0.25s ease;
        box-shadow: 0 0 40px rgba(0,0,0,0.4);
      }
      .sidebar.open { transform: translateX(0); }
      .main { width: 100%; }
      .main-topbar { padding: 12px 18px; }
      .page-wrap { padding: 0 18px 50px; }
      .mobile-toggle {
        display: inline-flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: 9px;
        background: var(--white); border: 1px solid rgba(0,0,0,0.08);
        color: var(--navy); cursor: pointer;
      }
      .mobile-toggle svg { width: 18px; height: 18px; }
      .overview-hero .hero h2 { font-size: 28px; }
      .overview-cards { margin: 0 -18px; }
      .overview-cards .sec-cards-grid { grid-template-columns: 1fr 1fr; }
    }
    .scrim { display: none; }
    .scrim.show {
      display: block; position: fixed; inset: 0; z-index: 40;
      background: rgba(12,24,41,0.45);
    }
  
    
    
    
    /* ── V4 PALETTE & TYPOGRAPHY ──────────────────────────────────── */
    :root {
      /* Primary */
      --navy:       #0c1829;
      --navy-mid:   #1f2b44;
      --gold:       #c9a84c;
      --gold-deep:  #a58430;

      /* Pink accent */
      --pink:       #d68a96;
      --pink-deep:  #b86375;
      --pink-soft:  #f5e1e5;
      --pink-wash:  #fcf6f7;

      /* Sage (complementary — used for "at market" / positive states) */
      --sage:       #7a9173;
      --sage-deep:  #5b7256;
      --sage-soft:  #e6ede3;
      --sage-wash:  #f5f8f3;

      /* Slate blue (info / secondary sector) */
      --slate:      #6b7a99;
      --slate-deep: #46557a;
      --slate-soft: #e3e8f1;

      /* Neutrals */
      --text:       #0c1829;
      --text-mid:   #2a3349;
      --text-soft:  #5a6478;
      --cream:      #faf8f3;
      --bg-app:     #faf8f3;
      --line:       rgba(12,24,41,0.08);
      --line-soft:  rgba(12,24,41,0.04);

      --font-serif: 'Fraunces', Georgia, serif;
      --font-body:  'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }
    body { background: var(--bg-app); color: var(--text); font-family: var(--font-body); }

    /* Serif headings — Fraunces with opsz/wght tuned for clean reading */
    h1, h2, .sec-title, .hero h2, .header-title h1, .sidebar-client, .ovctx-h, .card-title, .prov-card h3, .prov-group-name {
      font-family: var(--font-serif);
      font-variation-settings: 'opsz' 36, 'SOFT' 30, 'WONK' 0;
      letter-spacing: -0.018em;
      font-weight: 600;
    }
    .hero h2 em, .hero-italic { font-style: italic; font-variation-settings: 'opsz' 60, 'SOFT' 20, 'WONK' 0; font-weight: 600; }

    /* ── LIGHT SIDEBAR ─────────────────────────────────────────────── */
    .sidebar {
      background: #ffffff;
      color: var(--text);
      border-right: 1px solid var(--line);
    }
    .sidebar-head { border-bottom: 1px solid var(--line-soft); padding: 28px 22px 20px; }
    .sidebar-brand { color: var(--slate-deep); font-weight: 800; letter-spacing: 0.16em; font-size: 9.5px; text-transform: uppercase; }
    .sidebar-client { color: var(--text); font-size: 22px; line-height: 1.15; margin-top: 14px; }
    .sidebar-client-sub { color: var(--text-soft); font-size: 11px; margin-top: 4px; }
    .sidebar-nav { padding: 14px 12px; }
    .navlink { color: var(--text-soft); font-size: 13.5px; font-weight: 500; padding: 10px 14px; border-radius: 9px; }
    .navlink:hover { background: var(--pink-wash); color: var(--pink-deep); }
    .navlink.active { background: var(--pink-wash); color: var(--pink-deep); font-weight: 700; }
    .navlink.active::before { content: ''; position: absolute; left: -12px; top: 8px; bottom: 8px; width: 3px; border-radius: 0 3px 3px 0; background: var(--pink); }
    .navlink-icon { color: var(--text-soft); }
    .navlink:hover .navlink-icon, .navlink.active .navlink-icon { color: var(--pink-deep); }
    .sidebar-foot { border-top: 1px solid var(--line-soft); color: var(--text-soft); padding: 16px 22px; font-size: 10.5px; }
    .sidebar-foot .conf-tag { background: var(--slate-soft); border: 1px solid rgba(107,122,153,0.25); color: var(--slate-deep); }

    /* Top bar */
    .main-topbar { background: rgba(250,248,243,0.88); border-bottom: 1px solid var(--line); backdrop-filter: saturate(180%) blur(12px); }
    .crumb { color: var(--text-soft); }
    .crumb span { color: var(--text); font-family: var(--font-serif); font-weight: 700; }
    .pill { background: #ffffff; border: 1px solid var(--line); color: var(--text-mid); }

    /* ── LIGHT HERO ─────────────────────────────────────────────────── */
    .overview-hero { margin: 24px 0 22px; border-radius: var(--radius-lg); overflow: hidden; }
    .overview-hero .hero {
      background: linear-gradient(135deg, #ffffff 0%, var(--pink-wash) 60%, var(--sage-wash) 100%);
      padding: 64px 44px 56px; text-align: left; border: 1px solid var(--line);
      position: relative;
    }
    .overview-hero .hero::before, .overview-hero .hero::after { display: none; }
    .overview-hero .hero-content { max-width: 760px; margin: 0; }
    .overview-hero .hero-eyebrow {
      background: rgba(184,99,117,0.13); border: 1px solid rgba(184,99,117,0.3);
      color: var(--pink-deep); font-weight: 800;
    }
    .overview-hero .hero h2 {
      color: var(--text); font-size: 56px; font-weight: 600; line-height: 1.04;
      letter-spacing: -0.028em;
      font-variation-settings: 'opsz' 100, 'SOFT' 20, 'WONK' 0;
    }
    .overview-hero .hero h2 em { color: var(--pink-deep); font-style: italic; }
    .overview-hero .hero-sub { color: var(--text-mid); font-size: 16px; line-height: 1.7; max-width: 600px; margin-bottom: 36px; margin-left: 0; }
    .overview-hero .hero-stats { background: #ffffff; border: 1px solid var(--line); max-width: 640px; margin: 0; border-radius: var(--radius-lg); }
    .overview-hero .hs { border-right: 1px solid var(--line-soft); padding: 20px 22px; }
    .overview-hero .hs:last-child { border-right: none; }
    .overview-hero .hs-val { color: var(--text); font-family: var(--font-serif); font-weight: 600; font-size: 22px; }
    .overview-hero .hs:nth-child(2) .hs-val { color: var(--sage-deep); }
    .overview-hero .hs:nth-child(3) .hs-val { color: var(--slate-deep); }
    .overview-hero .hs:last-child .hs-val { color: var(--pink-deep); }
    .overview-hero .hs-lbl { color: var(--text-soft); }

    /* Section nav cards */
    .overview-cards .sec-cards-wrap { background: #ffffff; border-radius: var(--radius-lg); border: 1px solid var(--line); padding: 36px; }
    .overview-cards .sec-cards-label { color: var(--text-soft); font-weight: 800; }
    .sec-card { background: #ffffff; border: 1px solid var(--line); transition: all 0.2s; }
    .sec-card .sc-num { color: var(--text-soft); }
    .sec-card .sc-icon { background: var(--pink-wash); color: var(--pink-deep); }
    .sec-card:nth-child(2) .sc-icon { background: var(--sage-wash); color: var(--sage-deep); }
    .sec-card:nth-child(3) .sc-icon { background: var(--slate-soft); color: var(--slate-deep); }
    .sec-card:nth-child(4) .sc-icon { background: rgba(201,168,76,0.16); color: var(--gold-deep); }
    .sec-card:nth-child(5) .sc-icon { background: var(--sage-wash); color: var(--sage-deep); }
    .sec-card:nth-child(6) .sc-icon { background: var(--slate-soft); color: var(--slate-deep); }
    .sec-card .sc-title { color: var(--text); font-family: var(--font-serif); font-weight: 600; font-size: 13.5px; }
    .sec-card .sc-arrow { color: var(--pink-deep); }
    .sec-card:hover { border-color: var(--pink); background: var(--pink-wash); transform: translateY(-2px); }
    .sec-card:hover .sc-arrow { color: var(--pink-deep); }

    /* ── INTRO CARD ─────────────────────────────────────────────────── */
    .intro-card { background: #ffffff; border: 1px solid var(--line); border-left: 3px solid var(--pink); padding: 30px 34px; }
    .intro-card p { color: var(--text); }
    .intro-card strong { color: var(--text); font-weight: 600; }

    /* ════════════════════════════════════════════════════════════════ */
    /*  THEIR BENEFITS (provision) — REDESIGN                            */
    /* ════════════════════════════════════════════════════════════════ */
    .prov-summary {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
      margin: 24px 0 32px;
    }
    @media (max-width: 700px) { .prov-summary { grid-template-columns: 1fr 1fr; } }
    .prov-stat {
      background: #ffffff; border: 1px solid var(--line);
      border-radius: var(--radius-lg); padding: 22px 22px 20px;
      position: relative; overflow: hidden;
    }
    .prov-stat::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 3px; border-radius: var(--radius-lg) var(--radius-lg) 0 0;
    }
    .prov-stat-total::before { background: var(--navy); }
    .prov-stat-above::before { background: var(--sage); }
    .prov-stat-at::before    { background: var(--pink); }
    .prov-stat-mixed::before { background: var(--gold); }
    .prov-stat-num {
      font-family: var(--font-serif); font-size: 36px; font-weight: 700;
      line-height: 1; color: var(--text); letter-spacing: -0.025em;
      font-variation-settings: 'opsz' 80, 'SOFT' 20, 'WONK' 0;
    }
    .prov-stat-total .prov-stat-num { color: var(--navy); }
    .prov-stat-above .prov-stat-num { color: var(--sage-deep); }
    .prov-stat-at    .prov-stat-num { color: var(--pink-deep); }
    .prov-stat-mixed .prov-stat-num { color: var(--gold-deep); }
    .prov-stat-lbl {
      font-size: 11px; font-weight: 600; color: var(--text-soft);
      letter-spacing: 0.04em; text-transform: uppercase; margin-top: 8px;
    }

    .prov-group { margin-top: 28px; }
    .prov-group-head {
      display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
      padding-bottom: 14px; border-bottom: 1px solid var(--line);
    }
    .prov-group-icon {
      width: 40px; height: 40px; border-radius: 10px;
      display: inline-flex; align-items: center; justify-content: center;
      background: var(--pink-wash); color: var(--pink-deep);
    }
    .prov-group:nth-of-type(2) .prov-group-icon { background: var(--sage-wash); color: var(--sage-deep); }
    .prov-group:nth-of-type(3) .prov-group-icon { background: var(--slate-soft); color: var(--slate-deep); }
    .prov-group-icon svg { width: 20px; height: 20px; }
    .prov-group-name {
      font-family: var(--font-serif); font-size: 19px; font-weight: 600;
      color: var(--text); letter-spacing: -0.018em; line-height: 1.2;
      font-variation-settings: 'opsz' 36, 'SOFT' 20, 'WONK' 0;
    }
    .prov-group-desc { font-size: 12px; color: var(--text-soft); margin-top: 2px; letter-spacing: 0.005em; }

    .prov-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 0; }
    @media (max-width: 1100px) { .prov-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 640px) { .prov-grid { grid-template-columns: 1fr; } }

    .prov-card {
      background: #ffffff; border: 1px solid var(--line);
      border-top: 3px solid var(--pink); border-radius: var(--radius-lg);
      padding: 22px 22px 20px; box-shadow: 0 1px 3px rgba(12,24,41,0.04);
      position: relative; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    }
    .prov-card::after { display: none; }
    .prov-group:nth-of-type(2) .prov-card { border-top-color: var(--sage); }
    .prov-group:nth-of-type(3) .prov-card { border-top-color: var(--slate); }
    .prov-card:hover { transform: translateY(-2px); box-shadow: 0 10px 28px rgba(12,24,41,0.08); }
    .pc-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: var(--pink-wash); color: var(--pink-deep);
      display: inline-flex; align-items: center; justify-content: center; margin-bottom: 14px;
    }
    .prov-group:nth-of-type(2) .pc-icon { background: var(--sage-wash); color: var(--sage-deep); }
    .prov-group:nth-of-type(3) .pc-icon { background: var(--slate-soft); color: var(--slate-deep); }
    .pc-icon svg { width: 18px; height: 18px; }
    .prov-card h3 {
      font-family: var(--font-serif); font-size: 15px; font-weight: 600;
      color: var(--text); margin-bottom: 8px; line-height: 1.25;
      font-variation-settings: 'opsz' 24, 'SOFT' 20, 'WONK' 0;
    }
    .prov-card p { font-size: 12.5px; color: var(--text-mid); line-height: 1.65; margin-bottom: 16px; }
    .p-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.05em;
      text-transform: uppercase; padding: 4px 10px; border-radius: 100px;
    }
    .badge-green  { background: var(--sage-wash); color: var(--sage-deep); border: 1px solid rgba(122,145,115,0.3); }
    .badge-above  { background: var(--pink-wash); color: var(--pink-deep); border: 1px solid rgba(184,99,117,0.3); }
    .badge-amber  { background: rgba(201,168,76,0.13); color: var(--gold-deep); border: 1px solid rgba(165,132,48,0.3); }
    .badge-unique { background: var(--slate-soft); color: var(--slate-deep); border: 1px solid rgba(70,85,122,0.3); }
    .p-badge svg { width: 9px; height: 9px; }

    /* ════════════════════════════════════════════════════════════════ */
    /*  COMPARISON TABLES — keep dark column heads, refine the rest      */
    /* ════════════════════════════════════════════════════════════════ */
    .tbl-wrap { background: #ffffff; border: 1px solid var(--line); border-radius: var(--radius-lg); overflow: hidden; }
    .tbl-legend { padding: 11px 22px; background: #fbfaf6; border-bottom: 1px solid var(--line-soft); }
    .tbl-legend span { color: var(--text-soft); font-size: 11px; }
    .tbl-legend .primary-label { color: var(--pink-deep); font-weight: 800; }
    .ld-ha { background: var(--navy); }
    .ld-sp { background: var(--slate); }
    .ld-lp { background: var(--gold); }
    table { font-size: 13px; }
    thead th {
      padding: 14px 18px; font-family: var(--font-body);
      font-size: 10.5px; letter-spacing: 0.09em; font-weight: 700;
    }
    thead th:first-child { background: var(--navy) !important; color: var(--cream) !important; }
    thead th:nth-child(2) { background: var(--navy) !important; color: var(--cream) !important; }
    thead th:nth-child(2)::after { content: ' ★'; color: var(--pink); }
    thead th:nth-child(3) { background: var(--slate-deep) !important; color: var(--cream) !important; }
    thead th:nth-child(4) { background: var(--gold-deep) !important; color: #fef7e0 !important; }
    .col-sub { color: rgba(255,255,255,0.6); }

    tbody td { color: var(--text); font-size: 13px; vertical-align: top; white-space: normal; overflow: visible; text-overflow: clip; }
    tbody tr:nth-child(odd)  { background: #ffffff; }
    tbody tr:nth-child(even) { background: #fbfaf6; }
    tbody tr { border-bottom: 1px solid var(--line-soft); }
    tbody td:first-child { color: var(--text); font-weight: 700; border-right: 1px solid var(--line-soft); }
    tbody td:nth-child(2) { border-left: 3px solid rgba(12,24,41,0.1); }
    tbody td:nth-child(3) { border-left: 3px solid rgba(107,122,153,0.18); }
    tbody td:nth-child(4) { border-left: 3px solid rgba(201,168,76,0.22); }
    .cell-head { color: var(--text); font-weight: 700; line-height: 1.5; display: block; font-size: 13px; }
    .cell-head strong { font-weight: 700; }
    .brow .cell-body { display: none; }
    .brow.expanded .cell-body { display: block; margin-top: 10px; padding-top: 9px; color: var(--text-mid); font-weight: 400; line-height: 1.7; font-size: 12.5px; border-top: 1px solid var(--line-soft); }
    .brow { cursor: pointer; transition: background 0.15s; }
    .brow:hover { background: var(--pink-wash) !important; }
    .brow.expanded { background: #fdf9fa !important; }
    .yes-cell { color: var(--sage-deep); font-weight: 700; }
    .no-cell { color: var(--text-soft); font-weight: 600; }
    .mixed-cell { color: var(--gold-deep); font-weight: 700; }
    .na-cell { color: var(--text-soft); font-style: italic; }

    /* ── EXPAND TOOLBAR ───────────────────────────────────────────── */
    .exp-toolbar {
      display: flex; align-items: center; gap: 10px;
      margin: 22px 0 14px;
      padding: 10px 16px; background: #ffffff;
      border: 1px solid var(--line); border-radius: 10px;
    }
    .exp-search-wrap { flex: 1; max-width: 340px; position: relative; }
    .exp-search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-soft); pointer-events: none; }
    .exp-search { width: 100%; padding: 7px 12px 7px 32px; border-radius: 7px; border: 1px solid var(--line); background: var(--bg-app); font-family: inherit; font-size: 12.5px; color: var(--text); }
    .exp-search:focus { outline: none; border-color: var(--pink); box-shadow: 0 0 0 3px rgba(214,138,150,0.16); background: #fff; }
    .exp-all { all: unset; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; padding: 7px 13px; border-radius: 7px; background: #ffffff; border: 1px solid var(--line); color: var(--text); font-size: 11.5px; font-weight: 700; letter-spacing: 0.02em; }
    .exp-all:hover { background: var(--pink-wash); border-color: var(--pink); color: var(--pink-deep); }
    .exp-all svg { width: 11px; height: 11px; transition: transform 0.2s; }
    .exp-all.expanded svg { transform: rotate(-180deg); }

    .exp-cell { position: relative; display: flex !important; align-items: flex-start; gap: 10px; padding-top: 14px !important; padding-bottom: 14px !important; }
    .exp-toggle { all: unset; cursor: pointer; flex-shrink: 0; width: 22px; height: 22px; border-radius: 5px; display: inline-flex; align-items: center; justify-content: center; color: var(--text-soft); transition: all 0.2s; margin-top: 1px; }
    .exp-toggle:hover { background: rgba(12,24,41,0.06); color: var(--text); }
    .exp-toggle svg { width: 11px; height: 11px; }
    .brow.expanded .exp-toggle { transform: rotate(90deg); color: var(--pink-deep); }
    .exp-name { flex: 1; display: block; color: var(--text); font-weight: 700; }
    .exp-name .cell-sub { display: block; font-weight: 400; color: var(--text-soft); font-size: 11px; margin-top: 2px; }

    .brow-detail td { background: linear-gradient(180deg, var(--pink-wash) 0%, #ffffff 100%) !important; padding: 0 !important; border-top: none !important; }
    .exp-detail { padding: 18px 28px 22px; animation: expFade 0.22s ease; border-left: 3px solid var(--pink); margin-left: 22px; }
    @keyframes expFade { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .exp-detail-head { display: inline-flex; align-items: center; gap: 7px; font-size: 10.5px; font-weight: 800; color: var(--pink-deep); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .exp-detail-head svg { width: 13px; height: 13px; }
    .exp-detail-body { font-size: 13.5px; line-height: 1.78; color: var(--text); max-width: 920px; }
    .exp-detail-body strong { color: var(--text); font-weight: 700; }

    /* Filter hide */
    .brow.exp-filtered, .brow-detail.exp-filtered { display: none !important; }

    /* ── OVERVIEW CONTEXT CARDS ───────────────────────────────────── */
    .ovctx-card {
      background: #ffffff; border-radius: var(--radius-lg);
      box-shadow: 0 1px 3px rgba(12,24,41,0.04); padding: 28px 30px; margin-top: 18px;
      border: 1px solid var(--line); border-left: 3px solid var(--sage);
    }
    .ovctx-card:nth-of-type(2) { border-left-color: var(--slate); }
    .ovctx-h { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 14px; }
    .ovctx-card p { color: var(--text); font-size: 14px; line-height: 1.78; margin-bottom: 12px; }
    .ovctx-card p:last-child { margin-bottom: 0; }
    .ovctx-card strong { color: var(--text); font-weight: 700; }
    .ovctx-themes { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 14px; }
    @media (max-width: 720px) { .ovctx-themes { grid-template-columns: 1fr; } }
    .ovctx-theme { background: var(--sage-wash); border: 1px solid rgba(122,145,115,0.2); border-radius: var(--radius); padding: 18px 20px; }
    .ovctx-theme:nth-child(2) { background: var(--slate-soft); border-color: rgba(107,122,153,0.2); }
    .ovctx-theme-head { font-size: 10.5px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid rgba(122,145,115,0.25); color: var(--sage-deep); }
    .ovctx-theme:nth-child(2) .ovctx-theme-head { color: var(--slate-deep); border-bottom-color: rgba(107,122,153,0.25); }
    .ovctx-theme ul { list-style: none; padding: 0; }
    .ovctx-theme li { position: relative; padding-left: 18px; font-size: 13px; line-height: 1.6; margin-bottom: 7px; color: var(--text); }
    .ovctx-theme li::before { content: ''; position: absolute; left: 0; top: 8px; width: 5px; height: 5px; border-radius: 50%; background: var(--sage); }
    .ovctx-theme:nth-child(2) li::before { background: var(--slate); }

    /* ── PARAGRAPH POLISH (site-wide) ─────────────────────────────── */
    .hero-sub, .intro-card p, .ovctx-card p, .exp-detail-body, .ovctx-foot, .sec-desc {
      max-width: 65ch;
      line-height: 1.78;
    }
    .intro-card p { margin-bottom: 14px; }
    .intro-card p:last-child { margin-bottom: 0; }
    .ovctx-card p { margin-bottom: 14px; }
    .ovctx-card p:last-child { margin-bottom: 0; }

    /* ── QUARTILE EXPANSION PANEL ─────────────────────────────────── */
    .qpanel { padding: 22px 24px 26px; }
    .qpanel-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .qpanel-eyebrow {
      font-family: var(--font-body);
      font-size: 11px; font-weight: 800; color: var(--navy);
      letter-spacing: 0.12em; text-transform: uppercase;
    }
    .qpanel-star { color: var(--gold-deep); margin-left: 4px; }
    .qpanel-sub { font-size: 11px; color: var(--text-soft); letter-spacing: 0.04em; }

    /* The 3-segment bar */
    .qbar {
      display: flex; height: 14px; border-radius: 100px; overflow: hidden;
      box-shadow: inset 0 0 0 1px rgba(12,24,41,0.06);
      margin-bottom: 14px;
    }
    .qbar-seg { flex: 1; height: 100%; }
    .qbar-lq  { background: linear-gradient(90deg, #e8e7e3 0%, #d4d3cf 100%); border-right: 2px solid #ffffff; }
    .qbar-med { background: linear-gradient(90deg, #d4b860 0%, #c9a84c 100%); box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18); border-right: 2px solid #ffffff; }
    .qbar-uq  { background: linear-gradient(90deg, #2c3a8c 0%, #1a1a2e 100%); }

    /* 3 quartile cards under the bar */
    .qcards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
    @media (max-width: 760px) { .qcards { grid-template-columns: 1fr; } }
    .qcard {
      background: #ffffff; border: 1px solid var(--line);
      border-radius: 10px; padding: 14px 16px;
      position: relative; overflow: hidden;
    }
    .qcard::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
    }
    .qcard-lq::before  { background: linear-gradient(90deg, #d4d3cf, #b8b7b3); }
    .qcard-med::before { background: linear-gradient(90deg, #d4b860, #c9a84c); }
    .qcard-uq::before  { background: linear-gradient(90deg, #2c3a8c, #1a1a2e); }
    .qcard-med { box-shadow: 0 0 0 1px rgba(201,168,76,0.32), 0 2px 8px rgba(201,168,76,0.08); }
    .qcard-label {
      font-size: 10px; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text-soft); margin-bottom: 6px;
    }
    .qcard-lq  .qcard-label { color: #6e6c66; }
    .qcard-med .qcard-label { color: var(--gold-deep); }
    .qcard-uq  .qcard-label { color: var(--navy); }
    .qcard-star { color: var(--gold-deep); margin-left: 2px; }
    .qcard-value {
      font-family: var(--font-serif); font-variation-settings: 'opsz' 28, 'SOFT' 20, 'WONK' 0;
      font-size: 15px; font-weight: 600; line-height: 1.35; color: var(--text);
      letter-spacing: -0.005em;
    }

    /* Penge marker line below the cards */
    .qpenge {
      display: flex; align-items: center; gap: 9px;
      padding: 10px 14px; margin-top: 4px; margin-bottom: 4px;
      background: var(--pink-wash); border: 1px solid rgba(184,99,117,0.22);
      border-radius: 10px; font-size: 12.5px; color: var(--text); line-height: 1.5;
    }
    .qpenge-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--pink-deep); box-shadow: 0 0 0 3px rgba(184,99,117,0.18); flex-shrink: 0; }
    .qpenge strong { color: var(--pink-deep); font-weight: 700; }

    /* Divider between HA and SP/LP */
    .qpanel-divider { height: 1px; background: var(--line-soft); margin: 16px 0 14px; }

    /* SP / LP narrative cards */
    .qpanel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 760px) { .qpanel-grid { grid-template-columns: 1fr; } }
    .qbox-card { background: #ffffff; border: 1px solid var(--line); border-radius: 10px; padding: 14px 16px; }
    .qbox-card-head {
      display: flex; align-items: center; gap: 7px;
      font-size: 10.5px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
      margin-bottom: 8px; padding-bottom: 7px; border-bottom: 1px solid var(--line-soft);
    }
    .qbox-sp .qbox-card-head { color: var(--slate-deep); }
    .qbox-lp .qbox-card-head { color: var(--gold-deep); }
    .qdot { width: 8px; height: 8px; border-radius: 50%; }
    .qdot-sp { background: var(--slate); }
    .qdot-lp { background: var(--gold); }
    .qbox-card-body { font-size: 13px; line-height: 1.7; color: var(--text); }
    .qbox-card-body strong { color: var(--text); font-weight: 700; }

    /* Numeric comparison chart */
    .qchart { margin-top: 16px; padding: 14px 16px; background: #fbfaf6; border: 1px solid var(--line-soft); border-radius: 10px; }
    .qchart-head { font-size: 10.5px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 14px; }
    .qchart-axis-wrap { position: relative; height: 36px; margin: 6px 6px; }
    .qchart-axis { position: absolute; left: 0; right: 0; bottom: 11px; height: 2px; background: var(--line); border-radius: 2px; }
    .qchart-range { position: absolute; bottom: 8px; height: 8px; background: linear-gradient(90deg, #d4d3cf 0%, #c9a84c 50%, #1a1a2e 100%); border-radius: 100px; opacity: 0.45; }
    .qchart-marker { position: absolute; bottom: 4px; width: 14px; height: 14px; margin-left: -7px; border-radius: 50%; border: 2px solid #ffffff; }
    .qchart-m-lq     { background: #b8b7b3; }
    .qchart-m-median { background: #c9a84c; box-shadow: 0 0 0 2px rgba(201,168,76,0.25); width: 18px; height: 18px; margin-left: -9px; bottom: 2px; }
    .qchart-m-uq     { background: #1a1a2e; }
    .qchart-m-sp     { background: var(--slate); width: 11px; height: 11px; margin-left: -5.5px; bottom: 5.5px; }
    .qchart-m-lp     { background: var(--gold-deep); width: 11px; height: 11px; margin-left: -5.5px; bottom: 5.5px; }
    .qchart-m-penge  { background: var(--pink-deep); width: 16px; height: 16px; margin-left: -8px; bottom: 3px; box-shadow: 0 0 0 3px rgba(184,99,117,0.25); }
    .qchart-penge-flag {
      position: absolute; top: -22px; left: 50%; transform: translateX(-50%);
      background: var(--pink-deep); color: #ffffff; font-size: 9.5px; font-weight: 700;
      padding: 2px 7px; border-radius: 100px; white-space: nowrap; letter-spacing: 0.03em;
    }
    .qchart-legend { display: flex; flex-wrap: wrap; gap: 14px; margin-top: 10px; font-size: 10.5px; color: var(--text-mid); font-weight: 600; letter-spacing: 0.02em; }
    .qchart-legend span { display: inline-flex; align-items: center; gap: 5px; }
    .qchart-l { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .qchart-l-lq     { background: #b8b7b3; }
    .qchart-l-median { background: #c9a84c; }
    .qchart-l-uq     { background: #1a1a2e; }
    .qchart-l-sp     { background: var(--slate); }
    .qchart-l-lp     { background: var(--gold-deep); }
    .qchart-l-penge  { background: var(--pink-deep); }

    /* Detail commentary inside the qpanel */
    .qpanel .exp-detail { padding: 14px 16px; margin-left: 0; background: var(--pink-wash); border-left: 3px solid var(--pink); border-radius: 10px; }

    /* ── HERO: two-column layout with illustration ─────────────────── */
    .overview-hero .hero { padding: 56px 44px 48px; }
    .hero-content { position: relative; z-index: 2; }
    .overview-hero .hero { display: flex; align-items: center; gap: 32px; }
    .overview-hero .hero-content { flex: 1; min-width: 0; }
    .hero-illustration { flex-shrink: 0; width: 320px; max-width: 100%; }
    .hero-illustration svg { width: 100%; height: auto; display: block; }
    @media (max-width: 920px) { .overview-hero .hero { flex-direction: column; align-items: stretch; } .hero-illustration { width: 100%; max-width: 360px; margin-top: 24px; } }
    .overview-hero .hero h2 { font-size: 48px; line-height: 1.04; }
    .overview-hero .hero-sub { max-width: 56ch; }

    /* ── PROVISION STATS: clickable filters, new order ─────────────── */
    .prov-stat {
      all: unset; cursor: pointer; display: block;
      background: #ffffff; border: 1px solid var(--line);
      border-radius: var(--radius-lg); padding: 22px 22px 20px;
      position: relative; overflow: hidden;
      transition: transform 0.15s, box-shadow 0.15s, border-color 0.15s;
    }
    .prov-stat:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(12,24,41,0.08); }
    .prov-stat.active { box-shadow: 0 8px 22px rgba(12,24,41,0.12); }
    .prov-stat-total.active::after,
    .prov-stat-mixed.active::after,
    .prov-stat-at.active::after,
    .prov-stat-above.active::after {
      content: ''; position: absolute; inset: 0; pointer-events: none;
      border-radius: var(--radius-lg);
    }
    .prov-stat-total.active { border-color: var(--navy); }
    .prov-stat-mixed.active { border-color: var(--gold-deep); }
    .prov-stat-at.active    { border-color: var(--sage-deep); }
    .prov-stat-above.active { border-color: var(--pink-deep); }
    .prov-card-hidden { display: none !important; }

    /* ── PROVISION CARD EXPANDABLE ─────────────────────────────────── */
    .prov-card-expandable { cursor: pointer; transition: all 0.18s; }
    .prov-card-expandable:hover { box-shadow: 0 10px 26px rgba(12,24,41,0.1); }
    .prov-card-expanded { box-shadow: 0 10px 30px rgba(12,24,41,0.12); border-color: rgba(184,99,117,0.3); }
    .prov-card .pcard-expand {
      margin-top: 16px; padding-top: 16px;
      border-top: 1px solid var(--line-soft);
      animation: pcardFade 0.25s ease;
    }
    @keyframes pcardFade { from { opacity: 0; transform: translateY(-3px); } to { opacity: 1; transform: translateY(0); } }
    .pcard-q-head {
      font-size: 10.5px; font-weight: 800; color: var(--text-soft);
      letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px;
    }
    .pcard-q-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 10px; }
    .pcard-q-cell { background: #ffffff; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; position: relative; }
    .pcard-q-cell::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; border-radius: 8px 8px 0 0; }
    .pcard-q-lq::before  { background: #b8b7b3; }
    .pcard-q-med::before { background: var(--gold); }
    .pcard-q-uq::before  { background: var(--navy); }
    .pcard-q-med { box-shadow: 0 0 0 1px rgba(201,168,76,0.28); }
    .pcard-q-lbl { font-size: 8.5px; font-weight: 800; color: var(--text-soft); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
    .pcard-q-med .pcard-q-lbl { color: var(--gold-deep); }
    .pcard-q-uq  .pcard-q-lbl { color: var(--navy); }
    .pcard-q-val { font-family: var(--font-serif); font-size: 12px; font-weight: 600; color: var(--text); line-height: 1.35; font-variation-settings: 'opsz' 18, 'SOFT' 20, 'WONK' 0; }
    .pcard-penge {
      display: flex; align-items: center; gap: 10px;
      margin-top: 10px; padding: 9px 12px;
      background: var(--pink-wash); border: 1px solid rgba(184,99,117,0.22);
      border-radius: 8px;
    }
    .pcard-penge-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--pink-deep); flex-shrink: 0; box-shadow: 0 0 0 3px rgba(184,99,117,0.2); }
    .pcard-penge-name { font-size: 11.5px; color: var(--text); font-weight: 600; line-height: 1.4; }
    .pcard-penge-name strong { color: var(--pink-deep); font-weight: 700; }
    .pcard-penge-pos { font-size: 10.5px; color: var(--text-soft); margin-top: 2px; }

    /* ── COMPARISON TABLE EXPANSION: RESTRUCTURED ─────────────────── */
    .qpanel-section-ha {
      background: #ffffff; border: 1px solid var(--line);
      border-radius: var(--radius-lg); padding: 22px 24px 24px;
      box-shadow: 0 1px 3px rgba(12,24,41,0.04);
    }
    .qpanel-section-head { margin-bottom: 14px; }
    .qpanel-section-head .qpanel-eyebrow { display: block; font-size: 11px; font-weight: 800; color: var(--navy); letter-spacing: 0.12em; text-transform: uppercase; }
    .qpanel-section-head .qpanel-star { color: var(--gold-deep); }
    .qpanel-section-head .qpanel-sub { display: block; font-size: 11px; color: var(--text-soft); margin-top: 4px; letter-spacing: 0.04em; }

    /* Penge banner inside HA section */
    .qpenge-banner {
      display: flex; align-items: center; gap: 12px;
      margin-top: 14px; padding: 12px 16px;
      background: linear-gradient(90deg, var(--pink-wash), #ffffff);
      border: 1px solid rgba(184,99,117,0.22); border-radius: 10px;
    }
    .qpenge-banner-icon {
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--pink-deep); color: #ffffff;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .qpenge-banner-icon svg { width: 18px; height: 18px; }
    .qpenge-banner-head { font-size: 13px; color: var(--text); font-weight: 600; line-height: 1.4; }
    .qpenge-banner-head strong { color: var(--pink-deep); font-weight: 700; }
    .qpenge-banner-sub { font-size: 11.5px; color: var(--text-soft); margin-top: 1px; }

    /* At-a-glance row */
    .qglance { margin-top: 16px; }
    .qglance-head { font-size: 10.5px; font-weight: 800; color: var(--text-soft); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 10px; }
    .qglance-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    @media (max-width: 800px) { .qglance-grid { grid-template-columns: 1fr; } }
    .qglance-card {
      background: #ffffff; border: 1px solid var(--line);
      border-radius: 10px; padding: 13px 16px; position: relative;
    }
    .qglance-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: 10px 10px 0 0; }
    .qglance-ha::before { background: var(--navy); }
    .qglance-sp::before { background: var(--slate); }
    .qglance-lp::before { background: var(--gold-deep); }
    .qglance-ha { box-shadow: 0 0 0 1px rgba(184,99,117,0.18), 0 2px 8px rgba(12,24,41,0.04); }
    .qglance-card-head { display: flex; align-items: center; gap: 7px; font-size: 10.5px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-mid); margin-bottom: 8px; }
    .qglance-star { color: var(--gold-deep); margin-left: auto; }
    .qdot { width: 8px; height: 8px; border-radius: 50%; }
    .qdot-ha { background: var(--navy); }
    .qdot-sp { background: var(--slate); }
    .qdot-lp { background: var(--gold-deep); }
    .qglance-card-value { font-size: 13px; color: var(--text); line-height: 1.55; font-weight: 500; }
    .qglance-card-value strong { font-weight: 700; }
    .qglance-card-note { font-size: 10.5px; color: var(--text-soft); margin-top: 4px; font-style: italic; }

    /* ── EXP TOOLBAR: download buttons ─────────────────────────────── */
    .exp-dl {
      all: unset; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
      padding: 7px 11px; border-radius: 7px;
      background: #ffffff; border: 1px solid var(--line);
      color: var(--text-mid); font-size: 11px; font-weight: 600;
      letter-spacing: 0.02em;
    }
    .exp-dl:hover { background: var(--slate-soft); border-color: var(--slate); color: var(--slate-deep); }
    .exp-dl svg { width: 13px; height: 13px; }

    /* ── SIDEBAR LOGOUT ──────────────────────────────────────────── */
    .sidebar-logout {
      all: unset; cursor: pointer;
      display: inline-flex; align-items: center; gap: 7px;
      margin-top: 10px; padding: 7px 12px; border-radius: 8px;
      background: var(--slate-soft); border: 1px solid rgba(107,122,153,0.25);
      color: var(--slate-deep); font-size: 11.5px; font-weight: 700;
      letter-spacing: 0.02em;
    }
    .sidebar-logout:hover { background: var(--pink-wash); border-color: var(--pink); color: var(--pink-deep); }
    .sidebar-logout svg { width: 14px; height: 14px; }

    /* ── PRINT STYLES ──────────────────────────────────────────────── */
    @media print {
      .sidebar, .main-topbar, .exp-toolbar, #gate, .scrim { display: none !important; }
      .app-shell { display: block !important; }
      .main { width: 100% !important; }
      .page-wrap { padding: 0 !important; max-width: 100% !important; }
      body.print-section .page:not(.active) { display: none !important; }
      body.print-section .page.active { display: block !important; }
      .brow-detail { display: table-row !important; }

    .rb-q-lbl { font-size: 8.5px; font-weight: 800; color: var(--text-soft); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
    .rb-q-cell-med .rb-q-lbl { color: var(--gold-deep); }
    .rb-q-cell-uq  .rb-q-lbl { color: var(--navy); }
    .rb-q-val { font-family: var(--font-serif); font-size: 12.5px; font-weight: 600; color: var(--text); line-height: 1.35; font-variation-settings: 'opsz' 20, 'SOFT' 20, 'WONK' 0; }

    .rb-compare-row { font-size: 12.5px; color: var(--text); line-height: 1.65; padding: 8px 0; border-bottom: 1px dashed var(--line-soft); }
    .rb-compare-row:last-child { border-bottom: none; }
    .rb-compare-row strong { display: block; font-size: 10px; color: var(--text-soft); font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 4px; }
    .rb-compare-row em { font-style: normal; }

    .rb-no-bench {
      padding: 16px; background: var(--bg-app); border-radius: 8px;
      font-size: 12.5px; color: var(--text-soft); text-align: center; line-height: 1.5;
    }

    /* ── V10: centre intro card ───────────────────────────────────── */
    .intro-card {
      max-width: 920px;
      margin-left: auto !important;
      margin-right: auto !important;
    }

    /* ── V10: SECTION SUMMARY (commentary at bottom of comparison page) ── */
    .section-summary {
      margin: 32px 0 14px;
      background: #ffffff;
      border: 1px solid var(--line);
      border-left: 3px solid var(--sage);
      border-radius: var(--radius-lg);
      padding: 26px 30px;
      box-shadow: 0 1px 3px rgba(12,24,41,0.04);
    }
    .section-summary-head {
      display: flex; align-items: center; gap: 8px;
      font-family: var(--font-serif);
      font-size: 17px; font-weight: 600;
      color: var(--sage-deep);
      letter-spacing: -0.015em; margin-bottom: 14px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--line-soft);
      font-variation-settings: 'opsz' 24, 'SOFT' 20, 'WONK' 0;
    }
    .section-summary-head svg { width: 18px; height: 18px; color: var(--sage); }
    .section-summary-body p {
      color: var(--text); font-size: 13.5px; line-height: 1.8;
      margin: 0 0 12px 0; max-width: none;
    }
    .section-summary-body p:last-child { margin-bottom: 0; }
    .section-summary-body strong { color: var(--text); font-weight: 700; }

    /* ── V10: PNG button on rich panels ──────────────────────────── */
    .rb-png-btn {
      all: unset; cursor: pointer;
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 11px; border-radius: 7px;
      background: #ffffff; border: 1px solid var(--line);
      color: var(--text); font-size: 10.5px; font-weight: 700;
      letter-spacing: 0.05em;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      flex-shrink: 0;
    }
    .rb-png-btn:hover { background: var(--slate-soft); border-color: var(--slate); color: var(--slate-deep); }
    .rb-png-btn svg { width: 11px; height: 11px; }

    /* ── V10.1: intro card visually balanced ─────────────────────── */
    .overview-hero ~ .intro-section { padding-top: 28px; }
    .intro-section { display: flex; justify-content: center; }
    .intro-card {
      max-width: 920px !important;
      width: 100% !important;
      margin-left: auto !important;
      margin-right: auto !important;
      border-left: 1px solid var(--line) !important;
      border-top: 3px solid var(--pink) !important;
      padding: 32px 40px !important;
      text-align: left;
    }
    .intro-card p { max-width: none !important; }

function b64decode(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
async function deriveKey(secret) {
  const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(secret), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: b64decode(BUNDLE.salt), iterations: 200000, hash: 'SHA-256' },
    material, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
}
async function tryUnlock(u, p) {
  const key = await deriveKey(u + ':' + p);
  const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64decode(BUNDLE.iv) }, key, b64decode(BUNDLE.ct));
  return new TextDecoder().decode(dec);
}
function inject(html) {
  const content = document.getElementById('content');
  content.innerHTML = html;
  content.hidden = false;
  // Move all <script> tags to re-execute (innerHTML doesn't run them)
  content.querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    if (old.src) s.src = old.src;
    else s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
  });
  document.body.classList.remove('locked');
  document.getElementById('gate').remove();
}
document.getElementById('gate-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('g-submit'), err = document.getElementById('g-err');
  const u = document.getElementById('g-user').value.trim();
  const p = document.getElementById('g-pass').value;
  err.textContent = ''; btn.disabled = true; btn.textContent = 'Unlocking…';
  try {
    inject(await tryUnlock(u, p));
    try { sessionStorage.setItem('pc_unlock', JSON.stringify({u, p})); } catch (_) {}
  } catch (_) {
    err.textContent = 'Incorrect username or password.';
    btn.disabled = false; btn.textContent = 'Sign in';
  }
});
(async () => {
  try {
    const stored = sessionStorage.getItem('pc_unlock'); if (!stored) return;
    const { u, p } = JSON.parse(stored);
    inject(await tryUnlock(u, p));
  } catch (_) { try { sessionStorage.removeItem('pc_unlock'); } catch (_) {} }
})();
</script>
