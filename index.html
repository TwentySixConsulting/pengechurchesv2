<!DOCTYPE html>
<html lang="en">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Penge Churches — Benefits Intelligence Report | TwentySix</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,300..800;1,300..800&family=Space+Grotesk:wght@400..700&display=swap" rel="stylesheet">
  <style>

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy:       #0c1829;
      --navy-mid:   #152238;
      --navy-light: #1e2f4a;
      --gold:       #c9a84c;
      --gold-light: #e2c97e;
      --cream:      #f7f5f0;
      --white:      #ffffff;
      --text:       #0c1829;
      --text-mid:   #374151;
      --text-soft:  #6b7280;
      --green:      #15803d;
      --green-bg:   #dcfce7;
      --above-green:  #0e6b2e;
      --above-bg:   #bbf7d0;
      --amber:      #b45309;
      --amber-bg:   #fef3c7;
      --unique:     #4338ca;
      --unique-bg:  #e0e7ff;
      --col-s-head: #1a3158;
      --col-l-head: #163828;
      --col-t-head: #3d1828;
      --shadow-sm:  0 1px 3px rgba(12,24,41,0.07);
      --shadow-md:  0 4px 20px rgba(12,24,41,0.09), 0 1px 4px rgba(12,24,41,0.05);
      --shadow-lg:  0 12px 48px rgba(12,24,41,0.13), 0 4px 12px rgba(12,24,41,0.07);
      --radius:     8px;
      --radius-lg:  14px;
    }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.65;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HEADER ── */
    .site-header {
      background: var(--navy);
      position: sticky; top: 0; z-index: 200;
      box-shadow: 0 2px 24px rgba(0,0,0,0.4);
    }
    .header-inner {
      max-width: 1380px; margin: 0 auto;
      padding: 14px 40px;
      display: flex; align-items: center; gap: 20px;
    }
    .header-wordmark { display: flex; flex-direction: column; gap: 1px; flex-shrink: 0; }
    .header-wordmark .wm-name { color: var(--white); font-size: 17px; font-weight: 800; letter-spacing: -0.02em; line-height: 1; }
    .header-wordmark .wm-name span { color: var(--white); }
    .hd { width: 1px; height: 26px; background: rgba(255,255,255,0.12); flex-shrink: 0; }
    .header-title { flex: 1; }
    .header-title h1 { color: #fff; font-size: 13px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .header-title span { color: rgba(255,255,255,0.4); font-size: 11px; }
    .client-chip {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(201,168,76,0.15); border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold-light); font-size: 11px; font-weight: 600;
      letter-spacing: 0.08em; text-transform: uppercase;
      padding: 4px 13px; border-radius: 100px;
    }
    .date-note { color: rgba(255,255,255,0.3); font-size: 10px; display: block; text-align: right; margin-top: 3px; }

    /* ── SECTION NAV ── */
    .section-nav {
      background: var(--white); border-bottom: 1px solid rgba(0,0,0,0.07);
      position: sticky; top: 60px; z-index: 190;
      box-shadow: var(--shadow-sm);
    }
    .nav-inner {
      max-width: 1380px; margin: 0 auto; padding: 0 40px;
      display: flex; overflow-x: auto;
    }
    .nav-inner::-webkit-scrollbar { display: none; }
    .nav-inner a {
      display: flex; align-items: center; gap: 7px;
      padding: 12px 16px; text-decoration: none;
      color: var(--text-soft); font-size: 12px; font-weight: 600;
      letter-spacing: 0.04em; white-space: nowrap;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }
    .nav-inner a:hover { color: var(--navy); border-bottom-color: var(--gold); }
    .nav-inner a svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── HERO ── */
    .hero {
      background: linear-gradient(160deg, var(--navy) 0%, var(--navy-mid) 55%, #1c3050 100%);
      padding: 80px 40px 72px; text-align: center;
      position: relative; overflow: hidden;
    }
    .hero::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 50% at 25% 60%, rgba(201,168,76,0.09) 0%, transparent 100%),
                  radial-gradient(ellipse 50% 50% at 75% 40%, rgba(201,168,76,0.06) 0%, transparent 100%);
      pointer-events: none;
    }
    .hero::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 1px; background: linear-gradient(to right, transparent, rgba(201,168,76,0.45), transparent);
    }
    .hero-content { position: relative; max-width: 800px; margin: 0 auto; }
    .hero-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.25);
      color: var(--gold-light); font-size: 10px; font-weight: 700;
      letter-spacing: 0.14em; text-transform: uppercase;
      padding: 6px 18px; border-radius: 100px; margin-bottom: 26px;
    }
    .hero h2 { color: var(--white); font-size: 46px; font-weight: 800; line-height: 1.1; margin-bottom: 18px; letter-spacing: -0.025em; }
    .hero h2 em { font-style: normal; color: var(--gold); }
    .hero-sub { color: rgba(255,255,255,0.55); font-size: 15.5px; max-width: 600px; margin: 0 auto 44px; line-height: 1.75; }
    .hero-stats {
      display: flex; justify-content: center;
      border: 1px solid rgba(255,255,255,0.08); border-radius: var(--radius-lg);
      overflow: hidden; background: rgba(255,255,255,0.03);
      max-width: 600px; margin: 0 auto;
    }
    .hs { flex: 1; padding: 18px 20px; border-right: 1px solid rgba(255,255,255,0.08); }
    .hs:last-child { border-right: none; }
    .hs-val { color: var(--gold-light); font-size: 20px; font-weight: 800; display: block; letter-spacing: -0.02em; }
    .hs-lbl { color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; display: block; }

    /* ── SECTION CARDS ── */
    .sec-cards-wrap { background: var(--navy-mid); padding: 44px 40px; border-bottom: 1px solid rgba(201,168,76,0.15); }
    .sec-cards-inner { max-width: 1380px; margin: 0 auto; }
    .sec-cards-label { text-align: center; color: rgba(255,255,255,0.35); font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 24px; }
    .sec-cards-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 14px; }
    .sec-card {
      display: flex; flex-direction: column;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius-lg); padding: 22px 18px 18px;
      text-decoration: none; position: relative; overflow: hidden;
      transition: background 0.2s, border-color 0.2s, transform 0.2s; cursor: pointer;
    }
    .sec-card:hover { transform: translateY(-3px); }
    .sec-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--gold); opacity: 0; transition: opacity 0.2s; }
    .sec-card:hover::before { opacity: 1; }
    .sc-num { font-size: 10px; font-weight: 800; letter-spacing: 0.1em; color: rgba(201,168,76,0.5); margin-bottom: 12px; display: block; }
    .sc-icon { width: 36px; height: 36px; border-radius: 9px; background: rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; flex-shrink: 0; color: var(--gold-light); }
    .sc-icon svg { width: 18px; height: 18px; }
    .sc-title { color: var(--white); font-size: 12px; font-weight: 700; line-height: 1.3; flex: 1; margin-bottom: 14px; }
    .sc-arrow { display: flex; align-items: center; gap: 5px; color: rgba(201,168,76,0.6); font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; transition: color 0.2s; }
    .sc-arrow svg { width: 14px; height: 14px; }
    .sc-c1 { --cc: 110, 168, 254; }
    .sc-c2 { --cc: 45,  212, 191; }
    .sc-c3 { --cc: 251, 113, 133; }
    .sc-c4 { --cc: 251, 191,  36; }
    .sc-c5 { --cc:  52, 211, 153; }
    .sc-c6 { --cc: 167, 139, 250; }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6) { background: rgba(var(--cc), 0.08); border-color: rgba(var(--cc), 0.22); }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6)::before { background: rgb(var(--cc)); opacity: 0.55; }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6) .sc-icon { background: rgba(var(--cc), 0.16); color: rgb(var(--cc)); }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6) .sc-num { color: rgba(var(--cc), 0.6); }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6) .sc-arrow { color: rgba(var(--cc), 0.55); }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6):hover { background: rgba(var(--cc), 0.14); border-color: rgba(var(--cc), 0.4); }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6):hover::before { opacity: 1; }
    :is(.sc-c1,.sc-c2,.sc-c3,.sc-c4,.sc-c5,.sc-c6):hover .sc-arrow { color: rgb(var(--cc)); }

    /* ── PAGE BODY ── */
    .page-body { max-width: 1380px; margin: 0 auto; padding: 0 40px 80px; }

    /* ── INTRO ── */
    .intro-section { padding: 48px 0 0; }
    .intro-card { background: var(--white); border-radius: var(--radius-lg); padding: 34px 38px; box-shadow: var(--shadow-md); border-left: 4px solid var(--gold); }
    .intro-card p { color: var(--text-mid); font-size: 14.5px; line-height: 1.85; margin-bottom: 14px; }
    .intro-card p:last-child { margin-bottom: 0; }
    .intro-card strong { color: var(--text); font-weight: 600; }

    /* ── RULE ── */
    .rule { height: 1px; background: linear-gradient(to right, transparent, rgba(201,168,76,0.2), transparent); margin-top: 48px; }

    /* ── BENCH SECTION ── */
    .bench-section { padding: 48px 0 0; }
    .sec-hd { margin-bottom: 22px; }
    .sec-label-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .sec-num-badge { display: flex; align-items: center; justify-content: center; width: 26px; height: 26px; border-radius: 50%; background: var(--navy); color: var(--gold); font-size: 11px; font-weight: 800; flex-shrink: 0; }
    .sec-eyebrow { font-size: 10px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--gold); }
    .sec-title { font-size: 21px; font-weight: 800; color: var(--navy); letter-spacing: -0.02em; }
    .sec-desc { font-size: 13px; color: var(--text-soft); margin-top: 5px; }

    /* ── PROVISION CARDS ── */
    .prov-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 22px; }
    .prov-card {
      background: var(--white); border-radius: var(--radius-lg);
      padding: 24px 22px; box-shadow: var(--shadow-md);
      border-top: 3px solid var(--gold); position: relative; overflow: hidden;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .prov-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
    .prov-card::after { content: ''; position: absolute; top: 0; right: 0; width: 80px; height: 80px; background: radial-gradient(circle at top right, rgba(201,168,76,0.07), transparent 70%); }
    .pc-icon { width: 38px; height: 38px; border-radius: 10px; background: linear-gradient(135deg, var(--navy), var(--navy-light)); display: flex; align-items: center; justify-content: center; margin-bottom: 14px; color: var(--gold-light); }
    .pc-icon svg { width: 18px; height: 18px; }
    .prov-card h3 { font-size: 13.5px; font-weight: 700; color: var(--navy); margin-bottom: 6px; }
    .prov-card p { font-size: 12.5px; color: var(--text-soft); line-height: 1.55; margin-bottom: 14px; }
    .p-badge { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 4px 10px; border-radius: 100px; }
    .badge-green  { background: var(--green-bg);  color: var(--green);       border: 1px solid rgba(21,128,61,0.2);  }
    .badge-above  { background: var(--above-bg);  color: var(--above-green); border: 1px solid rgba(14,107,46,0.25); }
    .badge-amber  { background: var(--amber-bg);  color: var(--amber);       border: 1px solid rgba(180,83,9,0.2);   }
    .badge-unique { background: var(--unique-bg); color: var(--unique);      border: 1px solid rgba(67,56,202,0.2);  }

    /* ── TABLE ── */
    .tbl-wrap { background: var(--white); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow-md); margin-top: 22px; margin-bottom: 16px; border: 1px solid rgba(0,0,0,0.04); }
    .tbl-legend { display: flex; align-items: center; gap: 22px; padding: 11px 22px; background: #f9f8f6; border-bottom: 1px solid rgba(0,0,0,0.06); }
    .tbl-legend span { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: var(--text-soft); letter-spacing: 0.03em; }
    .tbl-legend .primary-label { color: var(--navy); font-weight: 700; }
    .ld { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .ld-ha { background: #1a1a2e; }
    .ld-sp  { background: #4a7fcb; }
    .ld-lp   { background: #c9a84c; }

    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    table colgroup col:first-child  { width: 17%; }
    table colgroup col:nth-child(2),
    table colgroup col:nth-child(3),
    table colgroup col:nth-child(4) { width: 27.67%; }

    thead th { padding: 16px 20px; text-align: left; font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; vertical-align: bottom; line-height: 1.3; }
    thead th:first-child  { background: var(--navy); color: var(--gold-light); }
    thead th:nth-child(2) { background: var(--col-t-head); color: #f0b0c0; }
    thead th:nth-child(2)::after { content: ' ★'; font-size: 9px; opacity: 0.7; }
    thead th:nth-child(3) { background: var(--col-l-head); color: #90d8a8; }
    thead th:nth-child(4) { background: var(--col-s-head); color: #a8c6e8; }
    .col-sub { display: block; font-size: 9.5px; font-weight: 400; opacity: 0.55; margin-top: 3px; letter-spacing: 0.05em; }

    tbody tr:nth-child(odd)  { background: var(--white); }
    tbody tr:nth-child(even) { background: #fafaf8; }
    tbody tr { transition: background 0.1s; border-bottom: 1px solid rgba(0,0,0,0.045); }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: rgba(201,168,76,0.035) !important; }
    tbody td { padding: 15px 20px; vertical-align: top; color: var(--text-mid); line-height: 1.65; }
    tbody td:first-child { font-weight: 600; color: var(--navy); font-size: 12.5px; border-right: 1px solid rgba(0,0,0,0.06); }
    .cell-sub { display: block; font-size: 11px; font-weight: 400; color: var(--text-soft); margin-top: 3px; }
    tbody td:nth-child(2) { border-left: 2px solid rgba(176,48,96,0.12); }
    tbody td:nth-child(3) { border-left: 2px solid rgba(46,138,90,0.12); }
    tbody td:nth-child(4) { border-left: 2px solid rgba(74,127,203,0.12); }

    .yes-cell { display: inline-flex; align-items: center; gap: 6px; color: var(--green); font-weight: 600; font-size: 12.5px; }
    .yes-cell svg { width: 15px; height: 15px; flex-shrink: 0; }
    .no-cell { display: inline-flex; align-items: center; gap: 6px; color: var(--text-soft); font-size: 12.5px; font-style: italic; }
    .no-cell svg { width: 14px; height: 14px; flex-shrink: 0; opacity: 0.5; }
    .mixed-cell { color: var(--amber); font-weight: 500; font-size: 12.5px; }
    .na-cell { color: var(--text-soft); font-size: 12.5px; font-style: italic; }

    /* ── CALLOUT ── */
    .callout { background: linear-gradient(150deg, var(--navy) 0%, var(--navy-mid) 100%); border-radius: var(--radius-lg); padding: 24px 28px; position: relative; overflow: hidden; }
    .callout::before { content: ''; position: absolute; top: -20px; right: -20px; width: 120px; height: 120px; background: radial-gradient(circle, rgba(201,168,76,0.12), transparent 70%); }
    .callout-hd { display: flex; align-items: center; gap: 10px; margin-bottom: 13px; }
    .callout-hd svg { width: 18px; height: 18px; color: var(--gold); flex-shrink: 0; }
    .callout-hd h4 { color: var(--gold-light); font-size: 10.5px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; }
    .callout ul { list-style: none; display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 9px; }
    .callout li { display: flex; align-items: flex-start; gap: 9px; color: rgba(255,255,255,0.68); font-size: 13px; line-height: 1.55; }
    .callout li::before { content: ''; display: inline-block; width: 5px; height: 5px; border-radius: 50%; background: var(--gold); margin-top: 7px; flex-shrink: 0; }

    /* ── FOOTER ── */
    footer { background: var(--navy); padding: 44px 40px; text-align: center; margin-top: 60px; }
    .footer-wordmark { display: inline-block; margin-bottom: 20px; }
    .footer-wordmark .fw-name { color: rgba(255,255,255,0.5); font-size: 18px; font-weight: 800; letter-spacing: -0.02em; }
    .footer-wordmark .fw-name em { font-style: normal; color: rgba(201,168,76,0.65); }
    .footer-conf { display: inline-flex; align-items: center; gap: 6px; background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.2); color: rgba(201,168,76,0.6); font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 13px; border-radius: 100px; margin-top: 4px; margin-bottom: 20px; }
    .footer-txt { color: rgba(255,255,255,0.32); font-size: 12px; line-height: 1.85; }
    .footer-txt strong { color: rgba(255,255,255,0.55); font-weight: 500; }
    .footer-txt a { color: var(--gold); text-decoration: none; }
    .footer-rule { height: 1px; background: rgba(255,255,255,0.07); max-width: 360px; margin: 14px auto; }

    /* ── PRIMARY COMPARATOR NOTE ── */
    .primary-note {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(176,48,96,0.1); border: 1px solid rgba(176,48,96,0.2);
      color: #c06080; font-size: 10px; font-weight: 700;
      letter-spacing: 0.06em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 100px; margin-left: 8px; vertical-align: middle;
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1200px) { .sec-cards-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px)  { .sec-cards-grid { grid-template-columns: repeat(2, 1fr); } .prov-grid { grid-template-columns: repeat(2,1fr); } }
    @media (max-width: 640px)  {
      .hero h2 { font-size: 28px; } .page-body { padding: 0 20px 60px; }
      .header-inner { padding: 12px 20px; } .sec-cards-wrap { padding: 32px 20px; }
      .sec-cards-grid { grid-template-columns: 1fr 1fr; } .prov-grid { grid-template-columns: 1fr; }
      thead th { font-size: 10px; padding: 11px 13px; } tbody td { padding: 12px 13px; font-size: 12px; }
    }
  
    /* ── V2 OVERRIDES & SPA SHELL ───────────────────────────── */
    :root {
      --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      --font-display: 'Space Grotesk', 'Plus Jakarta Sans', sans-serif;
      --sidebar-w: 260px;
    }
    html, body { height: 100%; }
    body { font-family: var(--font-body); }
    h1, h2, h3, h4, .hero h2, .sec-title { font-family: var(--font-display); letter-spacing: -0.018em; }

    /* Hide v1 chrome (header/section-nav/footer/rule dividers) */
    .site-header, .section-nav, .rule, .page-body > footer { display: none !important; }

    /* App shell */
    .app-shell { display: flex; min-height: 100vh; }
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--navy);
      color: var(--cream);
      display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh;
      border-right: 1px solid rgba(201,168,76,0.18);
      z-index: 50;
    }
    .sidebar-head {
      padding: 26px 22px 18px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .sidebar-brand {
      color: var(--gold); font-size: 10px; font-weight: 800;
      letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 14px;
    }
    .sidebar-client {
      color: var(--white); font-family: var(--font-display);
      font-size: 19px; font-weight: 700; letter-spacing: -0.02em;
      line-height: 1.2;
    }
    .sidebar-client-sub {
      color: rgba(255,255,255,0.4); font-size: 11px; margin-top: 4px;
    }

    .sidebar-nav {
      padding: 14px 12px; flex: 1; overflow-y: auto;
      display: flex; flex-direction: column; gap: 2px;
    }
    .sidebar-nav::-webkit-scrollbar { width: 6px; }

function b64decode(s) { return Uint8Array.from(atob(s), c => c.charCodeAt(0)); }
async function deriveKey(secret) {
  const material = await crypto.subtle.importKey('raw', new TextEncoder().encode(secret), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt: b64decode(BUNDLE.salt), iterations: 200000, hash: 'SHA-256' },
    material, { name: 'AES-GCM', length: 256 }, false, ['decrypt']);
}
async function tryUnlock(u, p) {
  const key = await deriveKey(u + ':' + p);
  const dec = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: b64decode(BUNDLE.iv) }, key, b64decode(BUNDLE.ct));
  return new TextDecoder().decode(dec);
}
function inject(html) {
  const content = document.getElementById('content');
  content.innerHTML = html;
  content.hidden = false;
  // Move all <script> tags to re-execute (innerHTML doesn't run them)
  content.querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    if (old.src) s.src = old.src;
    else s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
  });
  document.body.classList.remove('locked');
  document.getElementById('gate').remove();
}
document.getElementById('gate-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('g-submit'), err = document.getElementById('g-err');
  const u = document.getElementById('g-user').value.trim();
  const p = document.getElementById('g-pass').value;
  err.textContent = ''; btn.disabled = true; btn.textContent = 'Unlocking…';
  try {
    inject(await tryUnlock(u, p));
    try { sessionStorage.setItem('pc_unlock', JSON.stringify({u, p})); } catch (_) {}
  } catch (_) {
    err.textContent = 'Incorrect username or password.';
    btn.disabled = false; btn.textContent = 'Sign in';
  }
});
(async () => {
  try {
    const stored = sessionStorage.getItem('pc_unlock'); if (!stored) return;
    const { u, p } = JSON.parse(stored);
    inject(await tryUnlock(u, p));
  } catch (_) { try { sessionStorage.removeItem('pc_unlock'); } catch (_) {} }
})();
</script>
